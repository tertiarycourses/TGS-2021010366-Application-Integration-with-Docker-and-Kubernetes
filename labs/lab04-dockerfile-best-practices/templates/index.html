<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root { --blue:#125AAF; --ink:#0F1A2C; --muted:#526A7E; --bg:#F4F8FF; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           margin:0; background:var(--bg); color:var(--ink); }
    header { background:var(--blue); color:#fff; padding:18px 24px; }
    header h1 { margin:0; font-size:22px; }
    header small { opacity:.85; }
    main { max-width:640px; margin:24px auto; padding:0 16px; }
    form.add { display:flex; gap:8px; margin-bottom:16px; }
    input[type=text] { flex:1; padding:10px 12px; border:1px solid #b9c8da;
                       border-radius:8px; font-size:15px; }
    button { background:var(--blue); color:#fff; border:0; border-radius:8px;
             padding:10px 16px; font-size:15px; cursor:pointer; }
    ul { list-style:none; padding:0; }
    li { background:#fff; border:1px solid #e0e8f3; border-radius:8px;
         padding:12px 14px; margin-bottom:8px; display:flex; align-items:center;
         justify-content:space-between; }
    li.done span.text { text-decoration:line-through; color:var(--muted); }
    .meta { color:var(--muted); font-size:13px; margin-top:16px; }
    .pill { display:inline-block; background:#e7f0fb; color:var(--blue);
            border-radius:999px; padding:2px 10px; font-size:12px; margin-right:6px; }
  </style>
</head>
<body>
  <header>
    <h1>{{ title }}</h1>
    <small>environment: {{ env }}{% if visits %} &middot; visits: {{ visits }}{% endif %}</small>
  </header>
  <main>
    <form class="add" method="post" action="/add">
      <input type="text" name="text" placeholder="Add a task…" autofocus>
      <button type="submit">Add</button>
    </form>

    <ul>
      {% for t in tasks %}
        <li class="{{ 'done' if t.done else '' }}">
          <span class="text">{{ t.text }}</span>
          {% if not t.done %}
          <form method="post" action="/done/{{ t.id }}">
            <button type="submit">Done</button>
          </form>
          {% endif %}
        </li>
      {% else %}
        <li><span class="text" style="color:var(--muted)">No tasks yet — add one above.</span></li>
      {% endfor %}
    </ul>

    <p class="meta">
      <span class="pill">store: {{ store }}</span>
      <span class="pill">cache: {{ cache }}</span>
      {{ tasks|length }} task(s)
    </p>
  </main>
</body>
</html>
